{% extends "layout.html" %}

{% block content %}
  <main class="auth-page">
    <section class="auth-panel" aria-labelledby="page-title">
      <div class="server-mark">Account Center</div>
      <h1 id="page-title">{{ site_title }}</h1>
      <p class="subtitle">登录账号进入用户中心，也可以在这里创建新的游戏账号。</p>

      <div class="auth-tabs" role="tablist" aria-label="账号操作">
        <button class="tab-button active" type="button" data-auth-tab="login">登录</button>
        <button class="tab-button" type="button" data-auth-tab="register">注册</button>
      </div>

      <form class="auth-form" data-auth-panel="login" method="post" action="{{ url_for('login') }}">
        <label>
          <span>账号名</span>
          <input type="text" name="username" autocomplete="username" required placeholder="player_abc">
        </label>

        <label>
          <span>密码</span>
          <input type="password" name="password" autocomplete="current-password" required placeholder="输入密码">
        </label>

        <button type="submit">登录</button>
        <a class="muted-link" href="{{ url_for('forgot_password') }}">忘记密码？暂未开放</a>
      </form>

      <form class="auth-form hidden" data-auth-panel="register" method="post" action="{{ url_for('register') }}">
        <label>
          <span>账号名</span>
          <input
            type="text"
            name="username"
            autocomplete="username"
            minlength="3"
            maxlength="16"
            pattern="[A-Za-z0-9_]{3,16}"
            required
            placeholder="player_abc">
        </label>

        <label>
          <span>密码</span>
          <input
            type="password"
            name="password"
            autocomplete="new-password"
            minlength="6"
            maxlength="32"
            required
            placeholder="6-32 位，不能有空格">
        </label>

        <label>
          <span>确认密码</span>
          <input
            type="password"
            name="confirm_password"
            autocomplete="new-password"
            minlength="6"
            maxlength="32"
            required
            placeholder="再次输入密码">
        </label>

        <label>
          <span>邮箱</span>
          <input type="email" name="email" autocomplete="email" placeholder="可选">
        </label>

        <label>
          <span>验证码：{{ captcha_question }}</span>
          <input type="text" name="captcha_answer" required inputmode="numeric" placeholder="输入计算结果">
        </label>

        <button type="submit">注册账号</button>
      </form>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
{% endblock %}
