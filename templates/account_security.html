{% extends "layout.html" %}

{% block content %}
  <main class="content-shell">
    <section class="page-heading">
      <div>
        <span class="server-mark">Security</span>
        <h1>账号安全</h1>
      </div>
    </section>

    <section class="tool-panel">
      <h2>修改密码</h2>
      <form class="auth-form" method="post" action="{{ url_for('change_password') }}">
        <label>
          <span>当前密码</span>
          <input type="password" name="current_password" autocomplete="current-password" required>
        </label>
        <label>
          <span>新密码</span>
          <input type="password" name="new_password" autocomplete="new-password" minlength="6" maxlength="32" required>
        </label>
        <label>
          <span>确认新密码</span>
          <input type="password" name="confirm_password" autocomplete="new-password" minlength="6" maxlength="32" required>
        </label>
        <button type="submit">保存新密码</button>
      </form>
    </section>
  </main>
{% endblock %}
