{% extends "layout.html" %}

{% block content %}
  <main class="auth-page">
    <section class="auth-panel">
      <div class="server-mark">Password Reset</div>
      <h1>设置新密码</h1>
      <p class="subtitle">重置链接只能使用一次，请设置 6 到 32 位且不含空格的新密码。</p>

      <form class="auth-form" method="post" action="{{ url_for('reset_password', token=token) }}">
        <label>
          <span>新密码</span>
          <input type="password" name="new_password" autocomplete="new-password" minlength="6" maxlength="32" required>
        </label>
        <label>
          <span>确认新密码</span>
          <input type="password" name="confirm_password" autocomplete="new-password" minlength="6" maxlength="32" required>
        </label>
        <button type="submit">重置密码</button>
      </form>
    </section>
  </main>
{% endblock %}
