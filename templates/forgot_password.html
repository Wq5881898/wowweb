{% extends "layout.html" %}

{% block content %}
  <main class="auth-page">
    <section class="auth-panel">
      <div class="server-mark">Account Recovery</div>
      <h1>密码找回</h1>
      <p class="subtitle">请输入账号名和账号已绑定的邮箱。匹配成功后，系统会发送一次性密码重置链接。</p>

      <form class="auth-form" method="post" action="{{ url_for('request_password_reset') }}">
        <label>
          <span>账号名</span>
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label>
          <span>邮箱</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <button type="submit">发送重置邮件</button>
      </form>

      <a class="muted-link recovery-back" href="{{ url_for('index') }}">返回登录</a>
    </section>
  </main>
{% endblock %}
